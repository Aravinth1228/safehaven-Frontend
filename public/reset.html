<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧹 Full Reset - SafeHaven</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      width: 100%;
    }
    .card {
      background: rgba(22, 33, 62, 0.9);
      border-radius: 20px;
      padding: 40px;
      margin: 20px 0;
      border: 2px solid #0f3460;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    h1 {
      color: #e94560;
      font-size: 32px;
      margin-bottom: 10px;
      text-align: center;
    }
    .subtitle {
      text-align: center;
      color: #8892b0;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .status {
      background: #0a0a15;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
      border: 1px solid #0f3460;
    }
    .status-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 12px 0;
      font-size: 14px;
    }
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #f59e0b;
      animation: pulse 2s infinite;
    }
    .status-dot.success {
      background: #059669;
      animation: none;
    }
    .status-dot.error {
      background: #dc2626;
      animation: none;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin: 10px 0;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
    }
    .btn-secondary {
      background: transparent;
      border: 2px solid #0f3460;
      color: #8892b0;
    }
    .btn-secondary:hover {
      border-color: #e94560;
      color: #fff;
    }
    .success-box {
      background: linear-gradient(135deg, #059669 0%, #10b981 100%);
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
      display: none;
      text-align: center;
    }
    .success-box h3 {
      margin-bottom: 10px;
      font-size: 20px;
    }
    .countdown {
      font-size: 24px;
      font-weight: bold;
      margin-top: 10px;
    }
    pre {
      background: #0a0a15;
      border-radius: 8px;
      padding: 15px;
      font-size: 11px;
      overflow-x: auto;
      color: #8892b0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>🧹 Full System Reset</h1>
      <p class="subtitle">Complete database and browser cleanup</p>

      <div class="status">
        <div class="status-item">
          <div class="status-dot" id="dbStatus"></div>
          <span id="dbStatusText">Checking database...</span>
        </div>
        <div class="status-item">
          <div class="status-dot" id="browserStatus"></div>
          <span id="browserStatusText">Checking browser storage...</span>
        </div>
        <div class="status-item">
          <div class="status-dot" id="backendStatus"></div>
          <span id="backendStatusText">Checking backend...</span>
        </div>
      </div>

      <button class="btn btn-primary" onclick="fullReset()" id="resetBtn">
        🧨 Reset Everything & Register New User
      </button>

      <button class="btn btn-secondary" onclick="window.location.href='/signup'">
        Go to Signup Page
      </button>

      <div class="success-box" id="successBox">
        <h3>✅ Reset Complete!</h3>
        <p>Redirecting to signup page...</p>
        <div class="countdown" id="countdown">3</div>
      </div>

      <div style="margin-top: 30px;">
        <h4 style="margin-bottom: 10px; color: #8892b0; font-size: 12px;">Current Storage:</h4>
        <pre id="storageData">Loading...</pre>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000/api';

    function updateStatus(elementId, text, type) {
      const dot = document.getElementById(elementId);
      const textEl = document.getElementById(elementId + 'Text');
      dot.className = 'status-dot ' + (type === 'success' ? 'success' : type === 'error' ? 'error' : '');
      textEl.textContent = text;
    }

    function showStorage() {
      const data = {};
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        data[key] = localStorage.getItem(key);
      }
      document.getElementById('storageData').textContent = JSON.stringify(data, null, 2) || 'Empty';
    }

    async function checkStatus() {
      // Check backend
      try {
        const res = await fetch(`${API_BASE}/health`);
        if (res.ok) {
          updateStatus('backendStatus', 'Backend is running', 'success');
        } else {
          updateStatus('backendStatus', 'Backend not responding', 'error');
        }
      } catch (e) {
        updateStatus('backendStatus', 'Backend offline - Start server!', 'error');
      }

      // Check MongoDB
      try {
        const res = await fetch(`${API_BASE}/users`);
        const data = await res.json();
        if (data.success) {
          updateStatus('dbStatus', `MongoDB connected - ${data.data.length} users`, data.data.length === 0 ? 'success' : '');
        }
      } catch (e) {
        updateStatus('dbStatus', 'MongoDB connection failed', 'error');
      }

      // Check browser storage
      const hasUser = localStorage.getItem('currentUser');
      updateStatus('browserStatus', hasUser ? 'User logged in (will be cleared)' : 'No user logged in', hasUser ? '' : 'success');

      showStorage();
    }

    async function fullReset() {
      const btn = document.getElementById('resetBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Resetting...';

      try {
        // Step 1: Drop database
        updateStatus('dbStatus', 'Dropping database...', '');
        await fetch(`${API_BASE}/drop-db`, { method: 'POST' });
        updateStatus('dbStatus', 'Database dropped!', 'success');

        // Step 2: Clear browser storage
        updateStatus('browserStatus', 'Clearing browser...', '');
        localStorage.clear();
        sessionStorage.clear();
        updateStatus('browserStatus', 'Browser storage cleared', 'success');
        showStorage();

        // Step 3: Show success
        document.getElementById('successBox').style.display = 'block';
        btn.style.display = 'none';

        // Countdown
        let count = 3;
        const interval = setInterval(() => {
          count--;
          document.getElementById('countdown').textContent = count;
          if (count <= 0) {
            clearInterval(interval);
            window.location.href = '/signup';
          }
        }, 1000);

      } catch (error) {
        alert('Error: ' + error.message);
        btn.disabled = false;
        btn.textContent = '🧨 Reset Everything & Register New User';
      }
    }

    // Run checks on load
    checkStatus();
    setInterval(checkStatus, 5000);
  </script>
</body>
</html>
